name: quality

on:
  push:
    branches: ["main", "staging", "dev"]
  pull_request:

permissions:
  contents: read
  checks: read

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        uses: actions/checkout@v7

      - name: Set up Go
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Verify authoritative dev push unit
        if: github.event_name == 'pull_request' && github.base_ref == 'staging' && github.head_ref == 'dev'
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          max_attempts=30
          sleep_seconds=10

          for attempt in $(seq 1 "${max_attempts}"); do
            run_id="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/actions/workflows/quality.yml/runs" \
              -f event=push \
              -f branch=dev \
              -f head_sha="${PR_HEAD_SHA}" \
              -F per_page=10 \
              --jq '.workflow_runs | sort_by(.created_at) | reverse | .[0].id // empty' \
              || true)"

            if [ -n "${run_id}" ]; then
              unit_job="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs" \
                --jq '.jobs[] | select(.name=="unit") | [.id, .status, (.conclusion // ""), .html_url] | @tsv' \
                | head -n 1 \
                || true)"

              if [ -n "${unit_job}" ]; then
                IFS=$'\t' read -r unit_id unit_status unit_conclusion unit_url <<< "${unit_job}"

                if [ "${unit_status}" = "completed" ] && [ "${unit_conclusion}" = "success" ]; then
                  echo "Authoritative dev push unit check ${unit_id} succeeded for ${PR_HEAD_SHA}."
                  echo "${unit_url}"
                  exit 0
                fi

                if [ "${unit_status}" = "completed" ]; then
                  echo "Authoritative dev push unit check ${unit_id} concluded with ${unit_conclusion}."
                  echo "${unit_url}"
                  exit 1
                fi

                echo "Authoritative dev push unit check ${unit_id} is ${unit_status}; waiting (${attempt}/${max_attempts})."
              else
                echo "Authoritative dev push quality run ${run_id} is visible, but its unit job is not yet visible; waiting (${attempt}/${max_attempts})."
              fi
            else
              echo "No authoritative dev push quality run is visible for ${PR_HEAD_SHA}; waiting (${attempt}/${max_attempts})."
            fi

            sleep "${sleep_seconds}"
          done

          echo "Timed out waiting for the authoritative dev push unit check for ${PR_HEAD_SHA}."
          exit 1

      - name: Go vet
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        run: go vet ./...

      - name: Tests with native coverage
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        run: go test -covermode=atomic -coverprofile=coverage.out ./...

      - name: Build coverage reports
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        run: |
          go tool cover -func=coverage.out -o coverage-summary.txt
          go tool cover -html=coverage.out -o coverage.html

      - name: Build unit status badge payload
        if: github.event_name == 'push'
        run: |
          go run scripts/build_badge_json.go status \
            --conclusion success \
            --label "${GITHUB_REF_NAME} unit" \
            --output unit-status.json

      - name: Build coverage badge payload
        if: github.event_name == 'push'
        run: |
          go run scripts/build_badge_json.go coverage \
            --coverage-file coverage.out \
            --label "coverage ${GITHUB_REF_NAME}" \
            --minimum 95.0 \
            --output coverage-badge.json

      - name: Upload unit status badge artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: unit-status-badge
          path: unit-status.json

      - name: Upload coverage badge artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-badge
          path: coverage-badge.json

      - name: Upload coverage reports
        if: github.event_name != 'pull_request' || github.base_ref != 'staging' || github.head_ref != 'dev'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: |
            coverage.out
            coverage-summary.txt
            coverage.html

  publish-badges:
    needs: unit
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Download unit status badge artifact
        if: needs.unit.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: unit-status-badge
          path: .

      - name: Download coverage badge artifact
        if: needs.unit.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: coverage-badge
          path: .

      - name: Build unit status badge payload
        if: needs.unit.result != 'success'
        run: |
          go run scripts/build_badge_json.go status \
            --conclusion "${{ needs.unit.result }}" \
            --label "${GITHUB_REF_NAME} unit" \
            --output unit-status.json

      - name: Publish branch badge JSON to badges branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges | grep -q .; then
            git clone --depth 1 --branch badges "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
            cd badges-work
            git checkout --orphan badges
            git rm -rf .
            mkdir -p branch-status
            touch branch-status/.gitkeep
            echo "# branch badge payloads" > README.md
            git add README.md branch-status/.gitkeep
            git commit -m "Initialize badges branch"
            git push origin badges
            cd ..
            rm -rf badges-work
            git clone --depth 1 --branch badges "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
          fi

          mkdir -p "badges-work/branch-status/${GH_BRANCH}"
          cp unit-status.json "badges-work/branch-status/${GH_BRANCH}/unit.json"

          if [ -f coverage-badge.json ]; then
            mkdir -p "badges-work/branch-coverage/${GH_BRANCH}"
            cp coverage-badge.json "badges-work/branch-coverage/${GH_BRANCH}/coverage.json"
          fi

          cd badges-work
          git add "branch-status/${GH_BRANCH}/unit.json"
          if [ -f "branch-coverage/${GH_BRANCH}/coverage.json" ]; then
            git add "branch-coverage/${GH_BRANCH}/coverage.json"
          fi
          if git diff --cached --quiet; then
            echo "No badge changes to publish."
            exit 0
          fi

          git commit -m "Update branch badges for ${GH_BRANCH} [skip ci]"
          git push origin badges
