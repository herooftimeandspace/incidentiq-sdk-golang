name: docs

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  checks: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  docs-build:
    name: docs-build
    permissions:
      contents: read
      checks: read
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Verify promotion-owned docs-build check
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref == 'promote/staging-to-main'
        env:
          CHECK_NAME: docs-build
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          max_attempts=30
          sleep_seconds=10

          for attempt in $(seq 1 "${max_attempts}"); do
            check_run="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${PR_HEAD_SHA}/check-runs?check_name=${CHECK_NAME}" \
              --jq '.check_runs
                | map(select((.details_url // "") == ""))
                | sort_by(.started_at)
                | reverse
                | .[0] // empty
                | if . == null then empty else [.id, .status, (.conclusion // ""), (.html_url // "")] | @tsv end' \
              | head -n 1 \
              || true)"

            if [ -n "${check_run}" ]; then
              IFS=$'\t' read -r check_id check_status check_conclusion check_url <<< "${check_run}"

              if [ "${check_status}" = "completed" ] && [ "${check_conclusion}" = "success" ]; then
                echo "Promotion-owned ${CHECK_NAME} check ${check_id} succeeded for ${PR_HEAD_SHA}."
                echo "${check_url}"
                exit 0
              fi

              if [ "${check_status}" = "completed" ]; then
                echo "Promotion-owned ${CHECK_NAME} check ${check_id} concluded with ${check_conclusion}."
                echo "${check_url}"
                exit 1
              fi

              echo "Promotion-owned ${CHECK_NAME} check ${check_id} is ${check_status}; waiting (${attempt}/${max_attempts})."
            else
              echo "No promotion-owned ${CHECK_NAME} check is visible for ${PR_HEAD_SHA}; waiting (${attempt}/${max_attempts})."
            fi

            sleep "${sleep_seconds}"
          done

          echo "Timed out waiting for promotion-owned ${CHECK_NAME} check for ${PR_HEAD_SHA}."
          exit 1

      - name: Checkout
        if: github.event_name != 'pull_request' || github.base_ref != 'main' || github.head_ref != 'promote/staging-to-main'
        uses: actions/checkout@v7

      - name: Set up Go
        if: github.event_name != 'pull_request' || github.base_ref != 'main' || github.head_ref != 'promote/staging-to-main'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Configure Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v6

      - name: Build docs site
        if: github.event_name != 'pull_request' || github.base_ref != 'main' || github.head_ref != 'promote/staging-to-main'
        run: go run scripts/build_docs_site.go

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  publish-badges:
    needs: docs-build
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build docs status badge payload
        run: |
          go run scripts/build_badge_json.go status \
            --conclusion "${{ needs.docs-build.result }}" \
            --label "main docs" \
            --output docs-status.json

      - name: Publish docs badge JSON to badges branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges | grep -q .; then
            git clone --depth 1 --branch badges "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
            cd badges-work
            git checkout --orphan badges
            git rm -rf .
            mkdir -p branch-coverage branch-status
            touch branch-coverage/.gitkeep branch-status/.gitkeep
            echo "# branch badge payloads" > README.md
            git add README.md branch-coverage/.gitkeep branch-status/.gitkeep
            git commit -m "Initialize badges branch"
            git push origin badges
            cd ..
            rm -rf badges-work
            git clone --depth 1 --branch badges "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
          fi

          mkdir -p "badges-work/branch-status/main"
          cp docs-status.json "badges-work/branch-status/main/docs.json"

          cd badges-work
          git add "branch-status/main/docs.json"
          if git diff --cached --quiet; then
            echo "No docs badge changes to publish."
            exit 0
          fi

          git commit -m "Update docs badge for main [skip ci]"
          git push origin badges

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.docs-build.result == 'success'
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: docs-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
