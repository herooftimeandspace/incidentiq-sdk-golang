name: integration

on:
  push:
    branches: ["staging", "main"]
  pull_request:
    branches: ["staging", "main"]
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: read
  checks: read

jobs:
  integration:
    name: integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Verify promotion-owned integration check
        if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref == 'promote/staging-to-main'
        env:
          CHECK_NAME: integration
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          max_attempts=30
          sleep_seconds=10

          for attempt in $(seq 1 "${max_attempts}"); do
            check_run="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${PR_HEAD_SHA}/check-runs?check_name=${CHECK_NAME}" \
              --jq '.check_runs
                | map(select((.details_url // "") == ""))
                | sort_by(.started_at)
                | reverse
                | .[0] // empty
                | if . == null then empty else [.id, .status, (.conclusion // ""), (.html_url // "")] | @tsv end' \
              | head -n 1 \
              || true)"

            if [ -n "${check_run}" ]; then
              IFS=$'\t' read -r check_id check_status check_conclusion check_url <<< "${check_run}"

              if [ "${check_status}" = "completed" ] && [ "${check_conclusion}" = "success" ]; then
                echo "Promotion-owned ${CHECK_NAME} check ${check_id} succeeded for ${PR_HEAD_SHA}."
                echo "${check_url}"
                exit 0
              fi

              if [ "${check_status}" = "completed" ]; then
                echo "Promotion-owned ${CHECK_NAME} check ${check_id} concluded with ${check_conclusion}."
                echo "${check_url}"
                exit 1
              fi

              echo "Promotion-owned ${CHECK_NAME} check ${check_id} is ${check_status}; waiting (${attempt}/${max_attempts})."
            else
              echo "No promotion-owned ${CHECK_NAME} check is visible for ${PR_HEAD_SHA}; waiting (${attempt}/${max_attempts})."
            fi

            sleep "${sleep_seconds}"
          done

          echo "Timed out waiting for promotion-owned ${CHECK_NAME} check for ${PR_HEAD_SHA}."
          exit 1

      - name: Checkout
        if: github.event_name != 'pull_request' || github.base_ref != 'main' || github.head_ref != 'promote/staging-to-main'
        uses: actions/checkout@v7

      - name: Set up Go
        if: github.event_name != 'pull_request' || github.base_ref != 'main' || github.head_ref != 'promote/staging-to-main'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Integration placeholder
        if: github.event_name != 'pull_request' || github.base_ref != 'main' || github.head_ref != 'promote/staging-to-main'
        run: |
          echo "No live Go integration suite is defined yet; protected branch pushes are covered by unit."

  publish-badges:
    needs: integration
    if: always() && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Build integration status badge payload
        run: |
          go run scripts/build_badge_json.go status \
            --conclusion "${{ needs.integration.result }}" \
            --label "${GITHUB_REF_NAME} integration" \
            --output integration-status.json

      - name: Publish integration badge JSON to badges branch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges | grep -q .; then
            git clone --depth 1 --branch badges "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
            cd badges-work
            git checkout --orphan badges
            git rm -rf .
            mkdir -p branch-status
            touch branch-status/.gitkeep
            echo "# branch badge payloads" > README.md
            git add README.md branch-status/.gitkeep
            git commit -m "Initialize badges branch"
            git push origin badges
            cd ..
            rm -rf badges-work
            git clone --depth 1 --branch badges "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" badges-work
          fi

          mkdir -p "badges-work/branch-status/${GH_BRANCH}"
          cp integration-status.json "badges-work/branch-status/${GH_BRANCH}/integration.json"

          cd badges-work
          git add "branch-status/${GH_BRANCH}/integration.json"
          if git diff --cached --quiet; then
            echo "No integration badge changes to publish."
            exit 0
          fi

          git commit -m "Update integration badge for ${GH_BRANCH} [skip ci]"
          git push origin badges
