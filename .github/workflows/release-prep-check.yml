name: release-prep

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read
  checks: read

jobs:
  release-prep:
    name: release-prep
    # The promotion workflow reports release-prep directly for the
    # Actions-authored staging -> main PR after it creates the prepared merge
    # branch. This job waits for that separate check-run instead of duplicating
    # the same validation work.
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'promote/staging-to-main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      GH_PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Verify promotion-owned release-prep check
        env:
          CHECK_NAME: release-prep
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          max_attempts=30
          sleep_seconds=10

          for attempt in $(seq 1 "${max_attempts}"); do
            check_run="$(gh api "repos/${GH_REPO}/commits/${PR_HEAD_SHA}/check-runs?check_name=${CHECK_NAME}" \
              --jq '.check_runs
                | map(select((.details_url // "") == ""))
                | sort_by(.started_at)
                | reverse
                | .[0] // empty
                | if . == null then empty else [.id, .status, (.conclusion // ""), (.html_url // "")] | @tsv end' \
              | head -n 1 \
              || true)"

            if [ -n "${check_run}" ]; then
              IFS=$'\t' read -r check_id check_status check_conclusion check_url <<< "${check_run}"

              if [ "${check_status}" = "completed" ] && [ "${check_conclusion}" = "success" ]; then
                echo "Promotion-owned ${CHECK_NAME} check ${check_id} succeeded for ${PR_HEAD_SHA}."
                echo "${check_url}"
                exit 0
              fi

              if [ "${check_status}" = "completed" ]; then
                echo "Promotion-owned ${CHECK_NAME} check ${check_id} concluded with ${check_conclusion}."
                echo "${check_url}"
                exit 1
              fi

              echo "Promotion-owned ${CHECK_NAME} check ${check_id} is ${check_status}; waiting (${attempt}/${max_attempts})."
            else
              echo "No promotion-owned ${CHECK_NAME} check is visible for ${PR_HEAD_SHA}; waiting (${attempt}/${max_attempts})."
            fi

            sleep "${sleep_seconds}"
          done

          echo "Timed out waiting for promotion-owned ${CHECK_NAME} check for ${PR_HEAD_SHA}."
          exit 1

      - name: Checkout promotion branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Verify current release-prep state
        run: |
          set -euo pipefail

          labels="$(gh pr view "${GH_PR_NUMBER}" --repo "${GH_REPO}" --json labels --jq '.labels[].name')"
          semver_labels="$(printf '%s\n' "${labels}" | grep '^semver:' || true)"
          semver_count="$(printf '%s\n' "${semver_labels}" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "${semver_count}" != "1" ]; then
            echo "Expected exactly one semver label on PR #${GH_PR_NUMBER}; found ${semver_count}."
            exit 1
          fi

          git fetch origin main staging
          if ! git merge-base --is-ancestor origin/staging HEAD; then
            echo "Prepared promotion head does not contain the latest staging tip."
            exit 1
          fi

          if ! git merge-base --is-ancestor origin/main HEAD; then
            echo "Prepared promotion head does not contain the latest main tip."
            exit 1
          fi

          part="${semver_labels#semver:}"
          current_tag="$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 origin/main 2>/dev/null || true)"
          if [ -z "${current_tag}" ]; then
            current_version="0.0.0"
          else
            current_version="${current_tag#v}"
          fi
          desired_version="$(go run scripts/release_tools.go bump --part "${part}" --current-version "${current_version}")"
          echo "Promotion branch is fully prepared for v${desired_version}."
